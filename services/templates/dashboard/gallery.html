{% extends 'dashboard/admin_dashboard.html' %}

{% block dashboard_content %}
<div class="p-6 bg-white rounded-xl shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-gray-800">Gallery Management</h2>

    <form method="POST" enctype="multipart/form-data" action="{% url 'gallery_manage' %}" class="mb-8 p-4 border-2 border-dashed border-gray-200 rounded-lg">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" name="title" placeholder="Image Title" class="border p-2 rounded">
            <input type="file" name="image_file" required class="border p-1 rounded">
        </div>
        <button type="submit" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">
            <i class="fas fa-upload mr-2"></i> Upload Image
        </button>
    </form>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        {% for img in images %}
        <div class="relative group border rounded overflow-hidden shadow-sm">
            <img src="{{ img.image.url }}" class="w-full h-40 object-cover">
            <div class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                <form action="{% url 'delete_gallery_image' img.pk %}" method="POST">
                    {% csrf_token %}
                    <button type="submit" class="bg-red-500 text-white p-2 rounded-full hover:bg-red-600">
                        <i class="fas fa-trash"></i>
                    </button>
                </form>
            </div>
            <p class="text-xs p-2 text-gray-600 truncate">{{ img.title }}</p>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
